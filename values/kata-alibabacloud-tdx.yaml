# This file is used to configure the kata runtime for Alibaba Cloud TDX baremetal environment
#
# This deployment will use the mirror image from Alibaba Cloud

architecture: x86_64

kata-as-coco-runtime:
  image:
    reference: registry-cn-hangzhou.ack.aliyuncs.com/dev/coco-kata-deploy
  imagePullPolicy: Always
  k8sDistribution: k8s
  debug: false

  # Snapshotter configuration
  snapshotter:
    setup: ["nydus"]

  # TEE (Trusted Execution Environment) shims configuration
  # Only enable the shims we want to expose
  shims:
    disableAll: true
    qemu-tdx:
      enabled: true
      supportedArches:
        - amd64
      containerd:
        snapshotter: nydus
        forceGuestPull: false
      crio:
        guestPull: true
      agent:
        httpsProxy: ""
        noProxy: ""

    qemu-coco-dev:
      enabled: true
      supportedArches:
        - amd64
      allowedHypervisorAnnotations: []
      containerd:
        snapshotter: nydus
        forceGuestPull: false
      crio:
        guestPull: true
      agent:
        httpsProxy: ""
        noProxy: ""

  # RuntimeClasses configuration
  runtimeClasses:
    enabled: true
    createDefault: false
    defaultName: "kata"

  # Default shim per architecture
  defaultShim:
    amd64: qemu-tdx