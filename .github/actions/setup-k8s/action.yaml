name: 'Setup Kubernetes'
description: 'Install Kubernetes distribution (kubeadm, k3s, k0s, rke2, or microk8s)'
inputs:
  distribution:
    description: 'Kubernetes distribution to install (kubeadm, k3s, k0s, rke2, microk8s)'
    required: true
    default: 'kubeadm'
  extra-params:
    description: 'Extra parameters for the distribution installer'
    required: false
    default: ''
  container-runtime:
    description: 'Container runtime for kubeadm (containerd or crio) - only for kubeadm'
    required: false
    default: 'containerd'
  runtime-version:
    description: 'Container runtime version - only for kubeadm'
    required: false
    default: 'latest'
  command:
    description: 'Command to run (setup or cleanup)'
    required: false
    default: 'setup'
  k8s-version:
    description: 'Kubernetes version (e.g., v1.29) - if not provided, will be fetched'
    required: false
    default: ''
runs:
  using: 'composite'
  steps:
    - name: Setup Kubernetes
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        K8S_VERSION: ${{ inputs.k8s-version }}
      run: |
        case "${{ inputs.distribution }}" in
          kubeadm)
            ${{ github.action_path }}/../../scripts/k8s-operations.sh ${{ inputs.command }} kubeadm \
              ${{ inputs.container-runtime }} \
              ${{ inputs.runtime-version }}
            ;;
          k3s)
            ${{ github.action_path }}/../../scripts/k8s-operations.sh ${{ inputs.command }} k3s \
              ${{ inputs.extra-params }}
            ;;
          k0s)
            ${{ github.action_path }}/../../scripts/k8s-operations.sh ${{ inputs.command }} k0s \
              ${{ inputs.extra-params }}
            ;;
          rke2)
            ${{ github.action_path }}/../../scripts/k8s-operations.sh ${{ inputs.command }} rke2
            ;;
          microk8s)
            ${{ github.action_path }}/../../scripts/k8s-operations.sh ${{ inputs.command }} microk8s
            ;;
          *)
            echo "❌ Unknown distribution: ${{ inputs.distribution }}"
            exit 1
            ;;
        esac
